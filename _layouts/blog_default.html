<!doctype html>
<html lang="{{ site.lang | default: 'de-DE' }}" style="background-color:#0f0a1a;color-scheme:dark">
  <head>
    {% assign asset_version = site.github.build_revision | default: site.time %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#0f0a1a">
    {% include critical_theme.html navigation_transitions=false %}
    <link rel="stylesheet" href="{{ '/assets/blog/css/site.css' | relative_url }}?v={{ asset_version | uri_escape }}">
    <script src="{{ '/assets/blog/js/search.js' | relative_url }}?v={{ asset_version | uri_escape }}" defer></script>
    <script src="{{ '/assets/blog/js/blog-navigation.js' | relative_url }}?v={{ asset_version | uri_escape }}" defer></script>
    {% seo %}
    {% feed_meta %}
  </head>
  <body style="background-color:#0f0a1a">
    {% include blog_header.html %}
    <main id="inhalt" class="site-main">
      {{ content }}
    </main>
    {% include blog_footer.html %}
  </body>
</html>
