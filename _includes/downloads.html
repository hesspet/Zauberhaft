<section id="downloads">
    <span class="section-label">Downloads</span>
    <h2 class="section-title">Direkt herunterladen</h2>
    <div class="dl-grid">
        {% for dl in site.data.downloads %}
        <a class="dl-item" href="{{ dl.url }}" target="_blank" rel="noopener">
            <span class="dl-icon">{{ dl.emoji }}</span>
            <span class="dl-info">
                <span class="dl-name">{{ dl.name }}</span>
                <span class="dl-desc">{{ dl.description }}</span>
            </span>
        </a>
        {% endfor %}
    </div>
</section>
