<nav class="site-navigation" aria-label="Blog-Navigation">
  <ul>
    {% for item in site.data.blog_site_navigation %}
      <li>
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
      </li>
    {% endfor %}
  </ul>
</nav>
