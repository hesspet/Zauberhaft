<style>
    :root {
        background-color: #0f0a1a;
        color-scheme: dark;
    }

    html,
    body {
        min-height: 100%;
        background-color: #0f0a1a;
    }

    body {
        margin: 0;
        color: #e1dce8;
    }

    @view-transition {
        navigation: auto;
    }

    ::view-transition {
        background-color: #0f0a1a;
    }

    ::view-transition-group(root) {
        animation-duration: 160ms;
        animation-timing-function: ease-out;
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
        mix-blend-mode: normal;
    }

    ::view-transition-old(root) {
        z-index: 1;
        animation: zauberhaft-root-fade-out 120ms ease-out both;
    }

    ::view-transition-new(root) {
        z-index: 2;
        animation: zauberhaft-root-fade-in 160ms ease-out both;
    }

    @keyframes zauberhaft-root-fade-out {
        from { opacity: 1; }
        to { opacity: 0; }
    }

    @keyframes zauberhaft-root-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
        }
    }

    .zauberhaft-navigation-overlay {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        background: #0f0a1a;
        pointer-events: none;
        opacity: 1;
    }

    html.zauberhaft-navigation-aktiv,
    body.zauberhaft-navigation-aktiv {
        background-color: #0f0a1a !important;
    }
</style>
<script>
    (function () {
        const ueberblendungKennung = "zauberhaft-navigation-overlay";
        let navigationsZeitgeber = 0;

        function entferneNavigationsUeberblendung() {
            const vorhandeneUeberblendung = document.getElementById(ueberblendungKennung);

            window.clearTimeout(navigationsZeitgeber);
            document.documentElement.classList.remove("zauberhaft-navigation-aktiv");

            if (document.body) {
                document.body.classList.remove("zauberhaft-navigation-aktiv");
            }

            if (vorhandeneUeberblendung) {
                vorhandeneUeberblendung.remove();
            }
        }

        function zeigeNavigationsUeberblendung() {
            if (document.getElementById(ueberblendungKennung)) {
                return;
            }

            document.documentElement.style.backgroundColor = "#0f0a1a";

            if (document.body) {
                document.body.style.backgroundColor = "#0f0a1a";
            }

            const navigationsUeberblendung = document.createElement("div");
            navigationsUeberblendung.id = ueberblendungKennung;
            navigationsUeberblendung.className = "zauberhaft-navigation-overlay";
            navigationsUeberblendung.setAttribute("aria-hidden", "true");

            document.documentElement.classList.add("zauberhaft-navigation-aktiv");

            if (document.body) {
                document.body.classList.add("zauberhaft-navigation-aktiv");
                document.body.appendChild(navigationsUeberblendung);
            } else {
                document.documentElement.appendChild(navigationsUeberblendung);
            }

            navigationsZeitgeber = window.setTimeout(entferneNavigationsUeberblendung, 4000);
        }

        function istInternerSeitenwechsel(verweisElement, ereignis) {
            const istTastaturEreignis = ereignis.type === "keydown";

            if (
                ereignis.defaultPrevented ||
                (!istTastaturEreignis && ereignis.button !== 0) ||
                ereignis.metaKey ||
                ereignis.ctrlKey ||
                ereignis.shiftKey ||
                ereignis.altKey ||
                verweisElement.hasAttribute("download")
            ) {
                return false;
            }

            const zielFenster = verweisElement.getAttribute("target");

            if (zielFenster && zielFenster !== "_self") {
                return false;
            }

            const zielAdresse = new URL(verweisElement.href, window.location.href);

            if (zielAdresse.origin !== window.location.origin) {
                return false;
            }

            const istGleicheSeite =
                zielAdresse.pathname === window.location.pathname &&
                zielAdresse.search === window.location.search;

            return !istGleicheSeite;
        }

        document.addEventListener(
            "pointerdown",
            function (ereignis) {
                const verweisElement = ereignis.target.closest
                    ? ereignis.target.closest("a[href]")
                    : null;

                if (verweisElement && istInternerSeitenwechsel(verweisElement, ereignis)) {
                    zeigeNavigationsUeberblendung();
                }
            },
            true
        );

        document.addEventListener(
            "click",
            function (ereignis) {
                const verweisElement = ereignis.target.closest
                    ? ereignis.target.closest("a[href]")
                    : null;

                if (verweisElement && istInternerSeitenwechsel(verweisElement, ereignis)) {
                    zeigeNavigationsUeberblendung();
                }
            },
            true
        );

        document.addEventListener(
            "keydown",
            function (ereignis) {
                const verweisElement = ereignis.target.closest
                    ? ereignis.target.closest("a[href]")
                    : null;

                if (
                    (ereignis.key === "Enter" || ereignis.key === " ") &&
                    verweisElement &&
                    istInternerSeitenwechsel(verweisElement, ereignis)
                ) {
                    zeigeNavigationsUeberblendung();
                }
            },
            true
        );

        window.addEventListener("beforeunload", zeigeNavigationsUeberblendung);
        window.addEventListener("pageshow", entferneNavigationsUeberblendung);
    })();
</script>
