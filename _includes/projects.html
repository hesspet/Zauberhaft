<section id="projekte">
    <span class="section-label">Projekte</span>
    <h2 class="section-title">Ausgewählte Arbeiten</h2>
    <div class="card-grid">
        {% for project in site.data.projects %}
        <div class="card">
            <div class="card-icon">{{ project.emoji }}</div>
            <h3>{{ project.name }}</h3>
            <p>{{ project.description }}</p>
            <div class="tags">
                {% for tag in project.tags %}
                <span class="tag">{{ tag }}</span>
                {% endfor %}
            </div>
            {% if project.url contains '://' %}
            <a class="card-link" href="{{ project.url }}" target="_blank" rel="noopener">Zum Projekt →</a>
            {% else %}
            <a class="card-link" href="{{ project.url }}">Zur Seite →</a>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</section>
