<head>
    {% assign asset_version = site.github.build_revision | default: site.time %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#0f0a1a">
    <meta name="view-transition" content="same-origin">
    {% include critical_theme.html %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ asset_version | uri_escape }}">
    <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
    {% seo %}
    {% feed_meta %}
</head>
